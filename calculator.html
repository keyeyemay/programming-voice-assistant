<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Siri Calculator - Lab 2</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="script.js"></script>
</head>
<body>
    <nav class="glass-nav">
        <div class="container nav-content">
            <a href="#" id="logo-link" class="navbar-brand">
                <span class="siri-gradient">Siri</span> Calculator
            </a>
            <div class="nav-actions">
                <button id="btn_bg_color" class="action-btn nav-btn">Смена фона</button>
                <a href="https://github.com/keyeyemay" target="_blank" class="action-btn nav-btn">GitHub</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="calc-wrapper glass-panel">
            <div id="result" class="result">0</div>

            <div class="btns-container">
                <div class="btn-row">
                    <button id="btn_mem_plus" class="my-btn adv-btn">M+</button>
                    <button id="btn_mem_minus" class="my-btn adv-btn">M-</button>
                    <button id="btn_mem_recall" class="my-btn adv-btn">MR</button>
                    <button id="btn_op_backspace" class="my-btn adv-btn danger">⌫</button>
                </div>

                <div class="btn-row">
                    <button id="btn_op_sqrt" class="my-btn adv-btn">√</button>
                    <button id="btn_op_square" class="my-btn adv-btn">x²</button>
                    <button id="btn_op_fact" class="my-btn adv-btn">x!</button>
                    <button id="btn_color_out" class="my-btn adv-btn">🎨</button>
                </div>

                <div class="btn-row">
                    <button id="btn_op_clear" class="my-btn secondary">AC</button>
                    <button id="btn_op_sign" class="my-btn secondary">+/-</button>
                    <button id="btn_op_percent" class="my-btn secondary">%</button>
                    <button id="btn_op_div" class="my-btn primary">/</button>
                </div>

                <div class="btn-row">
                    <button id="btn_digit_7" class="my-btn">7</button>
                    <button id="btn_digit_8" class="my-btn">8</button>
                    <button id="btn_digit_9" class="my-btn">9</button>
                    <button id="btn_op_mult" class="my-btn primary">×</button>
                </div>

                <div class="btn-row">
                    <button id="btn_digit_4" class="my-btn">4</button>
                    <button id="btn_digit_5" class="my-btn">5</button>
                    <button id="btn_digit_6" class="my-btn">6</button>
                    <button id="btn_op_minus" class="my-btn primary">-</button>
                </div>

                <div class="btn-row">
                    <button id="btn_digit_1" class="my-btn">1</button>
                    <button id="btn_digit_2" class="my-btn">2</button>
                    <button id="btn_digit_3" class="my-btn">3</button>
                    <button id="btn_op_plus" class="my-btn primary">+</button>
                </div>

                <div class="btn-row">
                    <button id="btn_digit_0" class="my-btn">0</button>
                    <button id="btn_digit_000" class="my-btn">000</button>
                    <button id="btn_digit_dot" class="my-btn">.</button>
                    <button id="btn_op_equal" class="my-btn primary">=</button>
                </div>

                <div class="btn-row" style="margin-top: 10px;">
                    <button id="btn_custom_rnd" class="my-btn siri-btn" style="width: 100%; border-radius: 20px;">Siri Randomizer (1-100)</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 <span class="siri-gradient">Siri</span> Project</p>
    </footer>
</body>
</html>
